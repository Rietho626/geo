<!DOCTYPE html>
<html>
    <head>
        <title>
            Geography Quiz
        </title>
        <script type="module" src="./js/quizController.js" defer>
        </script>
        <script type="module">
            import languagePack from "./js/settings/languagePack.js";
            import updateLang from "./js/updateLang.js";

            updateLang(languagePack, (localStorage.getItem("langPref") || "english"));
        </script>
        <link rel="stylesheet" id="theme-settings">
        <link rel="stylesheet" href="./css/styles.css">
    </head>
    <body>
        <header>
            <div>
                <div id="settings">
                    <div id="settings-button">
                        Settings
                    </div>
                    <ul id="settings-ul" class="invisible">
                        <li>
                            <div id="themes-button">Themes</div>
                            <ul id="themes-ul" class="invisible">
                                <li id="base-theme">Base Theme</li>
                                <li id="sunset-theme">Sunset Theme</li>
                            </ul>
                        </li>
                        <li>
                            <div id="languages-button">Languages</div>
                            <ul id="languages-ul" class="invisible">
                                <li id="lang-en">English</li>
                                <li id="lang-de">Deutsch</li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
            <nav>
                <div id="expand-topics">
                    Quiz Topics
                </div >
                <div id="cover">
                    <ul>
                        <li id="flag" class="quiz-link">Flags</li>
                        <li id="capital" class="quiz-link">Capitals</li>
                        <li id="population" class="quiz-link">Population</li>
                        <li id="area" class="quiz-link">Area</li>
                    </ul>
                </div>
            </nav>
        </header>
        <main>
            <div id="content-wrapper">
                <div id="create-quiz-container">
                    <form id="create-form" action="" method="POST">
                        <table>
                            <thead>
                                <tr>
                                    <th id="create">Create Quiz</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td><p id="select-above">Select a Quiz-Topic above to get started!</p></td></tr>
                            </tbody>
                        </table>
                    </form>
                </div>
                <div id="quiz-container">

                </div>
            </div>
        </main>
    </body>
</html>
