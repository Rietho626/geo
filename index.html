<!DOCTYPE html>
<html>
    <head>
        <title>
            Geography Quiz
        </title>
        <script type="module" src="./js/quizController.js">
              const settingsLink = document.getElementById("theme-settings");
              settingsLink.href = "./css/" + (localStorage.getItem("theme") || "baseTheme.css");
        </script>
        <link rel="stylesheet" id="theme-settings">
        <link rel="stylesheet" href="./css/styles.css">
    </head>
    <body>
        <header>
            <div>
                <div id="settings">
                    <div id="settings-button">
                        Settings
                    </div>
                    <ul id="settings-ul">
                        <li>
                            <div>Themes</div>
                            <ul id="themes-ul">
                                <li>Base Theme</li>
                                <li>Sunset Theme</li>
                            </ul>
                        </li>
                        <div>Languages</div>
                            <ul id="languages">
                                <li>Base Theme</li>
                                <li>Sunset Theme</li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
            <div>
                Quiz yourself in 
            </div>
            <nav>
                <ul>
                    <li id="flag" class="quiz-link">Flags</li>
                    <li id="capital" class="quiz-link">Capitals</li>
                    <li id="population" class="quiz-link">Population</li>
                    <li id="area" class="quiz-link">Area</li>
                </ul>
            </nav>
        </header>
        <main>
            <div id="content-wrapper">
                <div id="create-quiz-container">
                    <form id="create-form" action="" method="POST">
                        <table>
                            <thead>
                                <tr>
                                    <th>Create Quiz</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td><p>Select a Quiz-Topic above to get started!</p></td></tr>
                            </tbody>
                        </table>
                    </form>
                </div>
                <div id="quiz-container">

                </div>
            </div>
        </main>
    </body>
</html>
